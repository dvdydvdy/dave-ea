function loadTodos() {
  try {
    const raw = localStorage.getItem(TODO_STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // Seed defaults on first load
  localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(SEED_TODOS));
  return SEED_TODOS;
}

function getTodos() {
  const data = loadTodos();
  if (!data) return [];
  return data.filter(t => !t.done && !t.parentId).sort((a,b) => {
    const o = { high: 0, medium: 1, low: 2 };
    return (o[a.priority]||2) - (o[b.priority]||2);
  });
}

function getHighPriorityTodos() {
  return getTodos().filter(t => t.priority === "high").slice(0, 5);
}

function getAllPendingCount() {
  const data = loadTodos();
  if (!data) return 0;
  return data.filter(t => !t.done).length;
}

function getOverdueCount() {
  const data = loadTodos();
  if (!data) return 0;
  const today = new Date().toISOString().slice(0, 10);
  return data.filter(t => !t.done && t.deadline && t.deadline < today).length;
}

function now() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: "America/Los_Angeles" }));
}

function greeting() {
  const h = now().getHours();
  return h < 12 ? "morning" : h < 18 ? "afternoon" : "evening";
}

function dateStr() {
  return now().toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
}

function shortDate() {
  return now().toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

function parseTime(timeStr) {
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 0;
  let h = parseInt(m[1]); const min = parseInt(m[2]); const ap = m[3].toUpperCase();
  if (ap === "PM" && h !== 12) h += 12;
  if (ap === "AM" && h === 12) h = 0;
  return h * 60 + min;
}

function getEventStatus(evt) {
  const n = now();
  const nowMin = n.getHours() * 60 + n.getMinutes();
  const start = parseTime(evt.time);
  const end = evt.end ? parseTime(evt.end) : start + 60;
  if (nowMin >= start && nowMin < end) return "now";
  if (nowMin < start) return "upcoming";
  return "past";
}

function getNextEvent() {
  const n = now();
  const nowMin = n.getHours() * 60 + n.getMinutes();
  for (const evt of TODAY_EVENTS) {
    const start = parseTime(evt.time);
    if (start > nowMin) return evt;
    const end = evt.end ? parseTime(evt.end) : start + 60;
    if (nowMin >= start && nowMin < end) return evt;
  }
  return null;
}

function timeUntil(evt) {
  const n = now();
  const nowMin = n.getHours() * 60 + n.getMinutes();
  const start = parseTime(evt.time);
  const diff = start - nowMin;
  if (diff <= 0) return "Now";
  if (diff < 60) return `in ${diff}m`;
  return `in ${Math.floor(diff/60)}h ${diff%60}m`;
}

let recognition = null;

function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast("Voice not supported. Try Chrome."); return; }
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = "en-US";
  let gotResult = false;
  let voiceTimeout = null;
  recognition.onstart = () => { state.listening = true; state.voiceModal = true; state.voiceText = ""; gotResult = false; render();
    voiceTimeout = setTimeout(() => { if (!gotResult) { recognition.stop(); state.listening = false; state.voiceModal = false; showToast("No speech detected. Tap the mic to try again."); render(); } }, 8000);
  };
  recognition.onresult = (e) => {
    gotResult = true;
    state.voiceText = Array.from(e.results).map(r => r[0].transcript).join("");
    render();
    if (e.results[0].isFinal) { clearTimeout(voiceTimeout); processVoice(state.voiceText); }
  };
  recognition.onerror = (e) => { clearTimeout(voiceTimeout); state.listening = false; state.voiceModal = false;
    if (e.error === 'not-allowed') showToast("Microphone access denied. Check browser permissions.");
    else showToast("Voice error. Try again.");
    render();
  };
  recognition.onend = () => { clearTimeout(voiceTimeout); state.listening = false;
    if (!gotResult) { state.voiceModal = false; showToast("No speech detected. Tap the mic to try again."); }
    render();
  };
  recognition.start();
}

function stopVoice() {
  if (recognition) recognition.stop();
  state.listening = false; state.voiceModal = false; render();
}

function processVoice(text) {
  const l = text.toLowerCase();
  setTimeout(() => {
    if (l.includes("add todo") || l.includes("add task") || l.includes("remind me")) {
      const task = text.replace(/add (todo|task)|remind me (to)?/gi, "").trim();
      if (task) {
        addTodoToStorage(task, "medium");
        showToast(`Added: "${task}"`);
      }
    } else if (l.includes("what's next") || l.includes("next meeting")) {
      const next = getNextEvent();
      if (next) showToast(`Next: ${next.title} at ${next.time}`);
      else showToast("No more meetings today!");
    } else if (l.includes("inbox") || l.includes("email")) {
      state.tab = "inbox"; showToast("Here's your inbox.");
    } else if (l.includes("briefing") || l.includes("my day") || l.includes("what's today")) {
      state.tab = "home"; showToast(`${TODAY_EVENTS.length} events today. ${getAllPendingCount()} open tasks.`);
    } else if (l.includes("show task") || l.includes("show todo")) {
      state.tab = "todos"; showToast("Here are your tasks.");
    } else if (l.includes("prep")) {
      const next = getNextEvent();
      if (next && PREP_DATA[next.id]) { state.prepModal = next.id; showToast("Meeting prep loaded."); }
      else showToast("No prep available for the next meeting.");
    } else {
      showToast(`Heard: "${text}". Try "add task...", "what's next", "prep", or "briefing".`);
    }
    state.voiceModal = false; render();
  }, 400);
}

function showToast(msg) {
  state.toast = msg; render();
  setTimeout(() => { state.toast = ""; render(); }, 3500);
}

function addTodoToStorage(text, priority) {
  let todos = loadTodos() || [];
  const maxId = todos.reduce((m, t) => Math.max(m, t.id || 0), 200);
  todos.push({
    id: maxId + 1,
    text: text,
    category: "deals",
    priority: priority,
    done: false,
    parentId: null,
    person: "",
    deadline: "",
    nextStep: "",
    nextStepNote: ""
  });

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">

    h += `<div class="card add-form">

        <button class="add-btn" onclick="addNewTodo()">Add</button>
      </div>
    </div>`;
  }

  // Show tip about full todo app
  h += `<div class="card" style="padding:12px 16px;margin-bottom:16px;background:#eef2ff;border-color:#c7d2fe">

  </div>`;

  if (todos.length === 0) {
    h += `<div class="card" style="padding:24px;text-align:center;color:#6b7280;font-size:13px">No pending tasks found. Add one above or use the full to-do app.</div>`;
  } else {
    todos.slice(0, 20).forEach(t => {
      h += `<div class="card todo-item ${t.priority || 'medium'}">
        <span style="color:${priColor(t.priority||'medium')}">${icon('circle',18)}</span>
        <div style="flex:1;min-width:0">
          <span class="todo-text">${esc(t.text)}</span>

      h += `<p style="text-align:center;font-size:12px;color:#6b7280;margin-top:8px">+ ${todos.length - 20} more tasks. Open full app to see all.</p>`;
    }
  }

  h += `</div>`;
  return h;
}

function addNewTodo() {
  const inp = document.getElementById("new-todo-input");
  if (!inp || !inp.value.trim()) return;
  addTodoToStorage(inp.value.trim(), state.newPriority);
  state.newTodo = ""; state.showAdd = false;
  showToast("Task added to your to-do list!");
