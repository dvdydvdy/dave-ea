<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fafafa">
<title>Travel Hub - Dave's EA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { display: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI", Roboto, sans-serif;
    background: #fafafa; color: #111827;
    max-width: 480px; margin: 0 auto;
    min-height: 100vh; min-height: 100dvh;
    padding-bottom: 32px;
    overflow-x: hidden;
  }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e5e7eb; box-shadow: 0 1px 3px rgba(0,0,0,.04); margin-bottom: 10px; }
  .accent { color: #4f46e5; }
  .header { padding: 20px 20px 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .back-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: #4f46e5; font-weight: 600; font-family: inherit; display: flex; align-items: center; gap: 4px; }
  .section { padding: 0 16px; margin-bottom: 24px; }
  .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .trip-card { padding: 16px; }
  .trip-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .trip-dest { font-size: 18px; font-weight: 700; }
  .trip-dates { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .trip-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 8px; }
  .badge-upcoming { background: #eef2ff; color: #4f46e5; }
  .badge-active { background: #dcfce7; color: #16a34a; }
  .badge-past { background: #f3f4f6; color: #6b7280; }
  .leg { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-top: 1px solid #f3f4f6; }
  .leg-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .leg-info { flex: 1; }
  .leg-title { font-size: 13px; font-weight: 600; }
  .leg-detail { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .leg-time { font-size: 12px; font-weight: 600; color: #4f46e5; }
  .tz-bar { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px; margin-bottom: 20px; }
  .tz-card { flex-shrink: 0; padding: 12px 16px; min-width: 120px; text-align: center; }
  .tz-city { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .tz-time { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .tz-label { font-size: 10px; color: #6b7280; margin-top: 2px; }
  .tz-active { border-color: #4f46e5; background: #eef2ff; }
  .checklist { padding: 16px; }
  .check-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f9fafb; cursor: pointer; }
  .check-item:last-child { border-bottom: none; }
  .check-box { width: 20px; height: 20px; border-radius: 6px; border: 2px solid #d1d5db; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
  .check-box.checked { background: #4f46e5; border-color: #4f46e5; }
  .check-text { font-size: 13px; flex: 1; }
  .check-text.done { text-decoration: line-through; color: #9ca3af; }
  .doc-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f3f4f6; }
  .doc-row:last-child { border-bottom: none; }
  .doc-icon { font-size: 20px; flex-shrink: 0; }
  .doc-name { font-size: 13px; font-weight: 600; }
  .doc-detail { font-size: 11px; color: #6b7280; }
  .doc-status { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
  .status-valid { background: #dcfce7; color: #16a34a; }
  .status-expiring { background: #fef3c7; color: #d97706; }
  .empty-state { padding: 32px; text-align: center; color: #6b7280; font-size: 13px; }
  .add-trip-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; background: #4f46e5; color: #fff; border: none; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin: 0 16px; width: calc(100% - 32px); }
  .tip-card { padding: 12px 16px; margin: 0 16px 16px; background: #eef2ff; border-color: #c7d2fe; }
  .tip-card p { font-size: 12px; color: #4f46e5; font-weight: 500; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="window.location.href='index.html'">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    EA Home
  </button>
  <span style="font-size:13px;color:#6b7280" id="currentDate"></span>
</div>

<div style="padding:0 16px;margin-bottom:20px">
  <h1 style="font-size:24px;font-weight:800">Travel Hub</h1>
  <p style="font-size:13px;color:#6b7280;margin-top:4px">Upcoming trips, flights, hotels & logistics</p>
</div>

<!-- Timezone bar -->
<div class="tz-bar" id="tzBar"></div>

<!-- Trips -->
<div id="trips"></div>

<!-- Travel docs -->
<div class="section">
  <div class="section-title">Travel Documents</div>
  <div class="card" id="docs"></div>
</div>

<!-- Packing checklist -->
<div class="section">
  <div class="section-title">Packing Checklist</div>
  <div class="card checklist" id="packing"></div>
</div>

<div class="card tip-card">
  <p>Ask your EA in Cowork to add trips, look up flights, or check visa requirements.</p>
</div>

<script>
// ГўВ”ВЂГўВ”ВЂ Data ГўВ”ВЂГўВ”ВЂ
const TRIPS = [
  {
    id: 'sf-mar',
    destination: 'San Francisco, CA',
    dates: 'Mar 18 ГўВЂВ“ Mar 21, 2026',
    status: 'upcoming',
    purpose: 'LP Meeting & YC Demo Day',
    legs: [
      { icon: '\u2708\ufe0f', title: 'SQ 32 \u2192 SFO', detail: 'Singapore \u2192 San Francisco', time: 'Mar 18, 8:25 AM \u2192 8:15 AM', extra: 'Seat 11A \u00b7 Business' },
      { icon: '\ud83c\udfe8', title: 'The LINE SF', detail: '33 Turk St, San Francisco', time: 'Mar 18\u201321 (3 nights)', extra: 'Conf #LN-482910' },
      { icon: '\ud83d\ude95', title: 'Car service to airport', detail: 'Pickup from hotel lobby', time: 'Mar 21, 6:00 AM', extra: 'Blacklane \u00b7 Booked' },
      { icon: '\u2708\ufe0f', title: 'SQ 1 \u2192 SIN', detail: 'San Francisco \u2192 Singapore', time: 'Mar 21, 9:30 AM \u2192 Mar 22 6:50 PM', extra: 'Seat 18A \u00b7 Business' }
    ]
  },
  {
    id: 'tokyo-apr',
    destination: 'Tokyo, Japan',
    dates: 'Apr 7 ГўВЂВ“ Apr 11, 2026',
    status: 'upcoming',
    purpose: 'Asia Crypto Week & Fund Meetings',
    legs: [
      { icon: '\u2708\ufe0f', title: 'SQ 638 \u2192 NRT', detail: 'Singapore \u2192 Tokyo Narita', time: 'Apr 7, 9:00 AM \u2192 5:10 PM', extra: 'Seat 5K \u00b7 Business' },
      { icon: '\ud83c\udfe8', title: 'Aman Tokyo', detail: 'Otemachi Tower, Chiyoda', time: 'Apr 7\u201311 (4 nights)', extra: 'Conf #AM-77291' },
      { icon: '\u2708\ufe0f', title: 'SQ 637 \u2192 SIN', detail: 'Tokyo \u2192 Singapore', time: 'Apr 11, 6:45 PM \u2192 12:35 AM+1', extra: 'Seat 5A \u00b7 Business' }
    ]
  }
];

const DOCUMENTS = [
  { icon: '\ud83d\udcd8', name: 'Passport (Singapore)', detail: 'Exp: Jan 2030', status: 'valid' },
  { icon: '\ud83c\uddfa\ud83c\uddf8', name: 'US B1/B2 Visa', detail: 'Exp: Dec 2028', status: 'valid' },
  { icon: '\ud83c\uddef\ud83c\uddf5', name: 'Japan Visa Waiver', detail: '90 days visa-free', status: 'valid' },
  { icon: '\ud83d\udcb3', name: 'Global Entry', detail: 'Exp: Aug 2027', status: 'valid' },
  { icon: '\ud83c\udfe5', name: 'Travel Insurance', detail: 'Allianz \u00b7 Exp: Jun 2026', status: 'expiring' }
];

const PACKING_KEY = 'dave_packing_v1';

const DEFAULT_PACKING = [
  { text: 'Passport & travel docs', checked: false },
  { text: 'Laptop & charger', checked: false },
  { text: 'Phone charger & adapter', checked: false },
  { text: 'Business cards', checked: false },
  { text: 'Noise-canceling headphones', checked: false },
  { text: '2 dress shirts', checked: false },
  { text: '1 blazer', checked: false },
  { text: 'Casual outfits (3 days)', checked: false },
  { text: 'Workout clothes', checked: false },
  { text: 'Toiletry kit', checked: false },
  { text: 'Medications & vitamins', checked: false },
  { text: 'Portable battery pack', checked: false }
];

// ГўВ”ВЂГўВ”ВЂ Timezone clock ГўВ”ВЂГўВ”ВЂ
const TIMEZONES = [
  { city: 'Singapore', tz: 'Asia/Singapore', label: 'SGT (Home)' },
  { city: 'San Francisco', tz: 'America/Los_Angeles', label: 'PDT' },
  { city: 'New York', tz: 'America/New_York', label: 'EDT' },
  { city: 'Tokyo', tz: 'Asia/Tokyo', label: 'JST' },
  { city: 'London', tz: 'Europe/London', label: 'GMT' }
];

function renderTimezones() {
  const now = new Date();
  document.getElementById('tzBar').innerHTML = TIMEZONES.map((t, i) => {
    const time = now.toLocaleTimeString('en-US', { timeZone: t.tz, hour: '2-digit', minute: '2-digit', hour12: true });
    return `<div class="card tz-card ${i === 0 ? 'tz-active' : ''}">
      <div class="tz-city">${t.city}</div>
      <div class="tz-time">${time}</div>
      <div class="tz-label">${t.label}</div>
    </div>`;
  }).join('');
}

// ГўВ”ВЂГўВ”ВЂ Trips ГўВ”ВЂГўВ”ВЂ
function renderTrips() {
  let h = '';
  TRIPS.forEach(trip => {
    const badgeClass = trip.status === 'active' ? 'badge-active' : trip.status === 'upcoming' ? 'badge-upcoming' : 'badge-past';
    h += `<div class="section">
      <div class="card trip-card">
        <div class="trip-header">
          <div>
            <div class="trip-dest">${trip.destination}</div>
            <div class="trip-dates">${trip.dates}</div>
            <div style="font-size:12px;color:#6b7280;margin-top:4px">${trip.purpose}</div>
          </div>
          <span class="trip-badge ${badgeClass}">${trip.status}</span>
        </div>
        ${trip.legs.map(l => `<div class="leg">
          <span class="leg-icon">${l.icon}</span>
          <div class="leg-info">
            <div class="leg-title">${l.title}</div>
            <div class="leg-detail">${l.detail}</div>
            <div class="leg-time">${l.time}</div>
            ${l.extra ? `<div class="leg-detail">${l.extra}</div>` : ''}
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('trips').innerHTML = h;
}

// ГўВ”ВЂГўВ”ВЂ Documents ГўВ”ВЂГўВ”ВЂ
function renderDocs() {
  document.getElementById('docs').innerHTML = DOCUMENTS.map(d => `<div class="doc-row">
    <span class="doc-icon">${d.icon}</span>
    <div style="flex:1">
      <div class="doc-name">${d.name}</div>
      <div class="doc-detail">${d.detail}</div>
    </div>
    <span class="doc-status ${d.status === 'valid' ? 'status-valid' : 'status-expiring'}">${d.status}</span>
  </div>`).join('');
}

// ГўВ”ВЂГўВ”ВЂ Packing ГўВ”ВЂГўВ”ВЂ
function getPacking() {
  try { return JSON.parse(localStorage.getItem(PACKING_KEY)) || DEFAULT_PACKING; } catch { return DEFAULT_PACKING; }
}
function savePacking(items) { localStorage.setItem(PACKING_KEY, JSON.stringify(items)); }

function togglePack(idx) {
  const items = getPacking();
  items[idx].checked = !items[idx].checked;
  savePacking(items);
  renderPacking();
}

function renderPacking() {
  const items = getPacking();
  const done = items.filter(i => i.checked).length;
  document.getElementById('packing').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:13px;font-weight:600">${done}/${items.length} packed</span>
      <div style="flex:1;margin:0 12px;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden">
        <div style="width:${(done/items.length)*100}%;height:100%;background:#4f46e5;border-radius:3px;transition:width .3s"></div>
      </div>
      <button onclick="resetPacking()" style="background:none;border:none;font-size:11px;color:#6b7280;cursor:pointer;font-family:inherit">Reset</button>
    </div>
    ${items.map((item, i) => `<div class="check-item" onclick="togglePack(${i})">
      <div class="check-box ${item.checked ? 'checked' : ''}">${item.checked ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}</div>
      <span class="check-text ${item.checked ? 'done' : ''}">${item.text}</span>
    </div>`).join('')}
  `;
}

function resetPacking() {
  savePacking(DEFAULT_PACKING.map(i => ({...i, checked: false})));
  renderPacking();
}

// ГўВ”ВЂГўВ”ВЂ Init ГўВ”ВЂГўВ”ВЂ
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
renderTimezones();
renderTrips();
renderDocs();
renderPacking();
setInterval(renderTimezones, 60000);
</script>
</body>
</html>
