function loadTodos() {
  try {

      localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(SEED_TODOS));
      localStorage.setItem(SEED_VERSION_KEY, String(SEED_VERSION));
      return JSON.parse(JSON.stringify(SEED_TODOS));
    }
    const raw = localStorage.getItem(TODO_STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(SEED_TODOS));

  return JSON.parse(JSON.stringify(SEED_TODOS));
}

function getTodos() {
  const data = loadTodos();
  if (!data) return [];
  return data.filter(t => !t.done && !t.parentId).sort((a,b) => {
    const o = { high: 0, medium: 1, low: 2 };
    return (o[a.priority]||2) - (o[b.priority]||2);
  });
}

function getHighPriorityTodos() {
  return getTodos().filter(t => t.priority === "high").slice(0, 5);
}

function getAllPendingCount() {
  const data = loadTodos();
  if (!data) return 0;
  return data.filter(t => !t.done).length;
}

function getOverdueCount() {
  const data = loadTodos();
  if (!data) return 0;
  const today = new Date().toISOString().slice(0, 10);
  return data.filter(t => !t.done && t.deadline && t.deadline < today).length;
}

function now() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: "America/Los_Angeles" }));
}

function greeting() {
  const h = now().getHours();
  return h < 12 ? "morning" : h < 18 ? "afternoon" : "evening";
}

function dateStr() {
  return now().toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
}

function shortDate() {
  return now().toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

function parseTime(timeStr) {
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 0;
  let h = parseInt(m[1]); const min = parseInt(m[2]); const ap = m[3].toUpperCase();
  if (ap === "PM" && h !== 12) h += 12;
  if (ap === "AM" && h === 12) h = 0;
  return h * 60 + min;
}

function getEventStatus(evt) {
  const n = now();
  const nowMin = n.getHours() * 60 + n.getMinutes();
  const start = parseTime(evt.time);
  const end = evt.end ? parseTime(evt.end) : start + 60;
  if (nowMin >= start && nowMin < end) return "now";
  if (nowMin < start) return "upcoming";
  return "past";
}

function getNextEvent() {
  const n = now();
  const nowMin = n.getHours() * 60 + n.getMinutes();
  for (const evt of TODAY_EVENTS) {
    const start = parseTime(evt.time);
    if (start > nowMin) return evt;
    const end = evt.end ? parseTime(evt.end) : start + 60;
    if (nowMin >= start && nowMin < end) return evt;
  }
  return null;
}

function timeUntil(evt) {
  const n = now();
  const nowMin = n.getHours() * 60 + n.getMinutes();
  const start = parseTime(evt.time);
  const diff = start - nowMin;
  if (diff <= 0) return "Now";
  if (diff < 60) return `in ${diff}m`;
  return `in ${Math.floor(diff/60)}h ${diff%60}m`;
}

// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ Voice ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
let recognition = null;

function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast("Voice not supported. Try Chrome."); return; }
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = "en-US";
  let gotResult = false;
  let voiceTimeout = null;
  recognition.onstart = () => { state.listening = true; state.voiceModal = true; state.voiceText = ""; gotResult = false; render();
    voiceTimeout = setTimeout(() => { if (!gotResult) { recognition.stop(); state.listening = false; state.voiceModal = false; showToast("No speech detected. Tap the mic to try again."); render(); } }, 8000);
  };
  recognition.onresult = (e) => {
    gotResult = true;
    state.voiceText = Array.from(e.results).map(r => r[0].transcript).join("");
    render();
    if (e.results[0].isFinal) { clearTimeout(voiceTimeout); processVoice(state.voiceText); }
  };
  recognition.onerror = (e) => { clearTimeout(voiceTimeout); state.listening = false; state.voiceModal = false;
    if (e.error === 'not-allowed') showToast("Microphone access denied. Check browser permissions.");
    else showToast("Voice error. Try again.");
    render();
  };
  recognition.onend = () => { clearTimeout(voiceTimeout); state.listening = false;
    if (!gotResult) { state.voiceModal = false; showToast("No speech detected. Tap the mic to try again."); }
    render();
  };
  recognition.start();
}

function stopVoice() {
  if (recognition) recognition.stop();
  state.listening = false; state.voiceModal = false; render();
}

function processVoice(text) {
  const l = text.toLowerCase();
  setTimeout(() => {
    if (l.includes("add todo") || l.includes("add task") || l.includes("remind me")) {
      const task = text.replace(/add (todo|task)|remind me (to)?/gi, "").trim();
      if (task) {
        addTodoToStorage(task, "medium");
        showToast(`Added: "${task}"`);
      }
    } else if (l.includes("what's next") || l.includes("next meeting")) {
      const next = getNextEvent();
      if (next) showToast(`Next: ${next.title} at ${next.time}`);
      else showToast("No more meetings today!");
    } else if (l.includes("inbox") || l.includes("email")) {
      state.tab = "inbox"; showToast("Here's your inbox.");
    } else if (l.includes("briefing") || l.includes("my day") || l.includes("what's today")) {
      state.tab = "home"; showToast(`${TODAY_EVENTS.length} events today. ${getAllPendingCount()} open tasks.`);
    } else if (l.includes("show task") || l.includes("show todo")) {
      state.tab = "todos"; showToast("Here are your tasks.");
    } else if (l.includes("prep")) {
      const next = getNextEvent();
      if (next && PREP_DATA[next.id]) { state.prepModal = next.id; showToast("Meeting prep loaded."); }
      else showToast("No prep available for the next meeting.");
    } else {
      showToast(`Heard: "${text}". Try "add task...", "what's next", "prep", or "briefing".`);
    }
    state.voiceModal = false; render();
  }, 400);
}

function showToast(msg) {
  state.toast = msg; render();
  setTimeout(() => { state.toast = ""; render(); }, 3500);
}

// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ Todo Storage Integration ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function addTodoToStorage(text, priority) {
  let todos = loadTodos() || [];
  const maxId = todos.reduce((m, t) => Math.max(m, t.id || 0), 200);
  todos.push({
    id: maxId + 1,
    text: text,
    category: "deals",
    priority: priority,
    done: false,
    parentId: null,
    person: "",
    deadline: "",
    nextStep: "",
    nextStepNote: ""
  });
  saveTodos(todos);
}

function toggleDeepResearch() {

  state.prepResearchLoading = true; state.prepShowContext = false; state.prepContextLoading = false; render();

}
function togglePastContext() {

  state.prepContextLoading = true; state.prepShowResearch = false; state.prepResearchLoading = false; render();
  setTimeout(() => { state.prepContextLoading = false; state.prepShowContext = true; render(); }, 1000);
}

function renderDeepResearch(dr) {
  let h = '<div class="research-panel">';
  h += `<h3>${icon('search',16,'#312e81')} Deep Research</h3>`;
  if (dr.tags && dr.tags.length) {
    h += '<div style="margin-bottom:12px">';
    dr.tags.forEach(t => h += `<span class="r-tag ${t.type}">${esc(t.label)}</span>`);
    h += '</div>';
  }
  if (dr.sections) {
    dr.sections.forEach(s => {
      h += '<div class="r-card">';
      h += `<h4>${icon(s.icon||'zap',12,'#4f46e5')} ${esc(s.title)}</h4>`;
      if (s.text) h += `<p>${esc(s.text)}</p>`;
      if (s.items) h += '<ul>' + s.items.map(i => `<li>${esc(i)}</li>`).join('') + '</ul>';
      h += '</div>';
    });
  }
  h += '</div>';
  return h;
}

function renderPastContext(pc) {
  let h = '<div class="crm-panel">';
  h += `<h3>${icon('users',16,'#065f46')} CRM &mdash; Past Context</h3>`;

    pc.stats.forEach(s => h += `<span class="crm-stat">${esc(s.label)}: <strong>${esc(s.value)}</strong></span>`);

function cyclePri(id) {

  const t = todos.find(x => x.id === id);
  if (!t) return;
  const i = PRI_CYCLE.indexOf(t.priority || 'medium');
  t.priority = PRI_CYCLE[(i + 1) % 3];
  saveTodos(todos); render();
}
function toggleDone(id) {
  const todos = loadTodos();
  const t = todos.find(x => x.id === id);
  if (t) { t.done = !t.done; t.completedAt = t.done ? new Date().toISOString() : undefined; }
  saveTodos(todos); render();
}
function deleteTodo(id) {
  if (!confirm('Delete this task?')) return;
  let todos = loadTodos();
  todos.filter(t => t.parentId === id).forEach(t => t.parentId = null);
  todos = todos.filter(x => x.id !== id);
  saveTodos(todos); render();
}
function changeCat(id, newCat) {
  const todos = loadTodos();
  const t = todos.find(x => x.id === id);
  if (t) t.category = newCat;
  saveTodos(todos); render();
}
// в”Ђв”Ђв”Ђ Drag and Drop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let dragState = { id: null, fromCat: null };

function onDragStart(e, id, cat) {
  dragState = { id, fromCat: cat };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  requestAnimationFrame(() => e.target.classList.add('dragging'));
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragState = { id: null, fromCat: null };
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const item = e.target.closest('.todo-item');
  if (!item) return;
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  item.classList.add('drag-over');
}

function onDrop(e, targetId, targetCat) {
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const srcId = dragState.id;
  if (srcId === null || srcId === targetId) return;

  const todos = loadTodos();
  const src = todos.find(t => t.id === srcId);
  if (!src) return;

  if (targetCat && targetCat !== (src.category || 'admin')) {
    src.category = targetCat;
  }

  const catItems = todos.filter(t => !t.done && (t.category || 'admin') === (src.category || 'admin'));
  const srcIdx = catItems.findIndex(t => t.id === srcId);
  const tgtIdx = catItems.findIndex(t => t.id === targetId);
  if (srcIdx < 0 || tgtIdx < 0) { saveTodos(todos); render(); return; }

  catItems.forEach((t, i) => t.sortOrder = i * 10);
  if (srcIdx < tgtIdx) {
    src.sortOrder = catItems[tgtIdx].sortOrder + 1;
  } else {
    src.sortOrder = catItems[tgtIdx].sortOrder - 1;
  }

  saveTodos(todos); render();
}

let touchDrag = { el: null, id: null, cat: null, clone: null, startY: 0 };

function onTouchDragStart(e, id, cat) {
  e.preventDefault();
  const touch = e.touches[0];
  const item = e.target.closest('.todo-item');
  if (!item) return;

  touchDrag = { el: item, id, cat, startY: touch.clientY, clone: null };
  item.classList.add('dragging');

  const clone = item.cloneNode(true);
  clone.style.cssText = 'position:fixed;z-index:9999;pointer-events:none;opacity:0.8;width:' + item.offsetWidth + 'px;top:' + touch.clientY + 'px;left:' + item.getBoundingClientRect().left + 'px;box-shadow:0 4px 20px rgba(0,0,0,.15);background:#fff;border-radius:8px;';
  document.body.appendChild(clone);
  touchDrag.clone = clone;

  document.addEventListener('touchmove', onTouchDragMove, { passive: false });
  document.addEventListener('touchend', onTouchDragEnd);
}

function onTouchDragMove(e) {
  e.preventDefault();
  const touch = e.touches[0];
  if (touchDrag.clone) {
    touchDrag.clone.style.top = (touch.clientY - 20) + 'px';
  }
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  if (target) {
    const item = target.closest('.todo-item');
    if (item && item !== touchDrag.el) item.classList.add('drag-over');
  }
}

function onTouchDragEnd(e) {
  document.removeEventListener('touchmove', onTouchDragMove);
  document.removeEventListener('touchend', onTouchDragEnd);

  if (touchDrag.clone) touchDrag.clone.remove();
  if (touchDrag.el) touchDrag.el.classList.remove('dragging');

  const touch = e.changedTouches[0];
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  if (target) {
    const item = target.closest('.todo-item');
    if (item && item.dataset.todoId) {
      onDrop({ preventDefault() {} }, parseInt(item.dataset.todoId), item.dataset.cat);
    }
  }
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  touchDrag = { el: null, id: null, cat: null, clone: null, startY: 0 };
}

function setDeadline(id, val) {
  const todos = loadTodos();
  const t = todos.find(x => x.id === id);
  if (t) t.deadline = val;
  saveTodos(todos); render();
}
function promptDeadline(id) {
  const val = prompt('Enter deadline (YYYY-MM-DD):');
  if (val) setDeadline(id, val);
}
function startRenameTodo(id) {
  const todos = loadTodos(); const t = todos.find(x => x.id === id);
  if (!t || t.done) return;
  const el = document.getElementById('todo-text-' + id);
  if (!el) return;
  const input = document.createElement('input');
  input.type = 'text'; input.className = 'todo-edit-input'; input.value = t.text;
  el.replaceWith(input); input.focus(); input.select();
  const doSave = () => { const v = input.value.trim(); if (v && v !== t.text) { const td = loadTodos(); const t2 = td.find(x => x.id === id); if (t2) { t2.text = v; saveTodos(td); } } render(); };
  input.addEventListener('blur', doSave);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } if (e.key === 'Escape') { input.value = t.text; input.blur(); } });
}
function editPersonField(id) {
  const todos = loadTodos(); const t = todos.find(x => x.id === id);
  if (!t) return;
  const el = document.getElementById('person-' + id);
  if (!el) return;
  const input = document.createElement('input');
  input.type = 'text'; input.className = 'todo-edit-input'; input.style.width = '120px'; input.style.fontSize = '11px';
  input.value = t.person || ''; input.placeholder = 'Person name';
  el.replaceWith(input); input.focus(); input.select();
  const doSave = () => { const td = loadTodos(); const t2 = td.find(x => x.id === id); if (t2) { t2.person = input.value.trim(); saveTodos(td); } render(); };
  input.addEventListener('blur', doSave);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } if (e.key === 'Escape') { input.value = t.person || ''; input.blur(); } });
}
function fmtDeadline(d) {
  if (!d) return null;
  const date = new Date(d + 'T00:00:00');
  const n = new Date(); n.setHours(0,0,0,0);
  const diff = Math.ceil((date - n) / 86400000);
  const label = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  if (diff < 0) return { text: label + ' (overdue)', cls: 'meta-deadline' };
  if (diff === 0) return { text: 'Today', cls: 'meta-deadline' };
  if (diff === 1) return { text: 'Tomorrow', cls: 'meta-deadline' };
  if (diff <= 7) return { text: label + ' (' + diff + 'd)', cls: 'meta-deadline' };
  return { text: label, cls: 'meta-deadline far' };
}

function renderTodos() {
  const todos = loadTodos();
  const pending = todos.filter(t => !t.done);

  const highCount = pending.filter(t => t.priority === 'high').length;

  }
  const groups = {};
  CATEGORIES.forEach(c => groups[c.key] = []);

      if (hasSortOrder && a.sortOrder !== undefined && b.sortOrder !== undefined) return a.sortOrder - b.sortOrder;
      return (PRI_ORDER[a.priority||'medium']) - (PRI_ORDER[b.priority||'medium']);
    });
    const sorted = [];
    parents.forEach(p => { sorted.push(p); items.filter(t => t.parentId === p.id).sort((a,b) => (PRI_ORDER[a.priority||'medium']) - (PRI_ORDER[b.priority||'medium'])).forEach(k => sorted.push(k)); });
    const inSorted = new Set(sorted.map(t => t.id));
    items.filter(t => !inSorted.has(t.id)).forEach(t => sorted.push(t));
    groups[c.key] = sorted;
  });
  let h = `<div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

        <button onclick="addNewTodo()" style="padding:6px 16px;border-radius:8px;background:#4f46e5;color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto">Add</button>
      </div>
    </div>`;
  }
  h += `<input class="todo-search" type="text" placeholder="Search tasks..." value="${esc(state.todoSearch)}" oninput="state.todoSearch=this.value;render()">`;
  h += `<div class="todo-stats">

  </div>`;

      <span class="cat-count">${items.length}</span>
      <span class="cat-chevron">\u25bc</span>
    </div>`;
    if (!collapsed) {
      h += `<div class="cat-body">`;
      if (items.length === 0) {
        h += `<div style="padding:20px;text-align:center;color:#9ca3af;font-size:13px">No tasks</div>`;

                ${dl ? `<span class="${dl.cls}">${dl.text}</span>` : `<span class="meta-tag" style="cursor:pointer;color:#d1d5db" onclick="promptDeadline(${t.id})">+ deadline</span>`}
                ${t.nextStep ? `<span class="meta-tag" style="background:#f3f4f6;padding:1px 6px;border-radius:4px">\u26a1${esc(t.nextStep)}</span>` : ''}
                <select class="cat-dropdown" onchange="changeCat(${t.id},this.value)" title="Change category">
                  ${CATEGORIES.map(c => `<option value="${c.key}" ${c.key === (t.category||'admin') ? 'selected' : ''}>${c.name}</option>`).join('')}
                </select>

          </div>`;

      h += `</div>`;
    }
    h += `</div>`;
  });
  if (completed.length > 0) {
    h += `<div class="done-section">
      <div class="done-header ${state.showCompleted ? 'expanded' : ''}" onclick="state.showCompleted=!state.showCompleted;render()">
        <span style="font-size:13px;font-weight:600;color:#6b7280">Completed (${completed.length})</span>
        <span style="font-size:12px;color:#9ca3af">${state.showCompleted ? '\u25b2' : '\u25bc'}</span>
      </div>`;
    if (state.showCompleted) {
      h += `<div class="done-body">`;
      completed.slice().reverse().forEach(t => {
        h += `<div class="todo-item done-item">
          <div class="todo-check checked" onclick="toggleDone(${t.id})" title="Undo"></div>
          <div class="todo-content">
            <div class="todo-text struck">${esc(t.text)}</div>
            <div class="todo-meta">
              <span class="meta-tag" style="color:#9ca3af">${esc(t.category || 'admin')}</span>
              ${t.completedAt ? `<span class="meta-tag" style="color:#9ca3af">${new Date(t.completedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>` : ''}
            </div>
          </div>
          <button class="del-btn" onclick="deleteTodo(${t.id})" title="Delete">\u00d7</button>
        </div>`;
      });
      h += `</div>`;
    }
    h += `</div>`;
  }
  h += `</div>`;
  return h;
}

function addNewTodo() {
  const inp = document.getElementById("new-todo-input");
  if (!inp || !inp.value.trim()) return;
  const catSel = document.getElementById("new-todo-cat");
  const cat = catSel ? catSel.value : 'deals';
  const todos = loadTodos();
  const maxId = todos.reduce((m, t) => Math.max(m, t.id || 0), 200);
  todos.push({
    id: maxId + 1, text: inp.value.trim(), category: cat, priority: state.newPriority,
    done: false, parentId: null, person: '', deadline: '', nextStep: '', nextStepNote: '',
    created: new Date().toISOString()
  });
  saveTodos(todos);
  state.newTodo = ""; state.showAdd = false;
  showToast("Task added!");
  render();
}

function runInboxCmd() {
  const cmd = (state.inboxCmd || '').trim();
  if (!cmd) return;

  if (!state.inboxMessages) state.inboxMessages = [];
  state.inboxMessages.push({ role: 'user', text: cmd });
  state.inboxProcessing = true;
  state.inboxResult = null;
  state.inboxCmd = '';
  render();

  setTimeout(() => {
    const lower = cmd.toLowerCase();
    let response = '';

    if (lower.includes('triage') || lower.includes('unread') || lower.includes('catch up') || lower.includes('what did i miss')) {
      const action = INBOX_EMAILS.filter(e => e.category === 'action');
      const newsletters = INBOX_EMAILS.filter(e => e.category === 'newsletter');
      const notifs = INBOX_EMAILS.filter(e => e.category === 'notification');
      response = `Triaged ${INBOX_EMAILS.length} unread emails:\n\n`;
      response += `\u{1F534} ACTION REQUIRED (${action.length}):\n`;
      action.forEach(e => { response += `  \u2022 ${e.from}${e.company?' ('+e.company+')':''}: ${e.subject}\n`; });
      response += `\n\u{1F4DA} NEWSLETTERS (${newsletters.length}):\n`;
      newsletters.slice(0,5).forEach(e => { response += `  \u2022 ${e.from}: ${e.subject}\n`; });
      if (newsletters.length > 5) response += `  ... +${newsletters.length-5} more\n`;
      response += `\n\u{1F514} NOTIFICATIONS (${notifs.length}):\n`;
      notifs.forEach(e => { response += `  \u2022 ${e.from}: ${e.subject}\n`; });
      response += `\nPriority: Reply to Vincent Chen (Panta) - he wants to meet again tonight at 8:30 PM. Then review Dennis's two deal forwards (Booko YC W26, Palus Finance).`;

    } else if (lower.includes('summarize') && lower.includes('newsletter')) {
      const newsletters = INBOX_EMAILS.filter(e => e.category === 'newsletter');
      response = `\u{1F4DA} Newsletter Summary (${newsletters.length} unread):\n\n`;
      newsletters.forEach(e => { response += `\u{1F4F0} ${e.from}\n   ${e.subject}\n   ${e.snippet}\n\n`; });
      response += `Key themes: Stablecoin regulation (GENIUS Act), Mideast crisis impact on commodities, M&A activity in fintech (RBC/Pinch, PayPay IPO).`;

    } else if (lower.includes('draft') || lower.includes('reply') || lower.includes('respond')) {
      const person = cmd.match(/(?:to|for)\s+(\w+)/i)?.[1] || '';
      if (person) {
        const match = INBOX_EMAILS.find(e => e.from.toLowerCase().includes(person.toLowerCase()));
        if (match) {
          if (match.from.includes('Vincent')) {
            response = `Draft reply to ${match.from}:\n\n---\nHi Vincent,\n\nGreat meeting you too! 8:30 PM PT works for me. Looking forward to continuing our conversation.\n\nBest,\nDavid\n---\n\nShall I adjust the tone or content?`;
          } else if (match.from.includes('Athan')) {
            response = `Draft reply to ${match.from} (Copperlane):\n\n---\nHi Athan,\n\nThanks for the follow-up and the deck. Really enjoyed the discussion on pricing strategy - will review the materials and circle back with Dennis this week.\n\nBest,\nDavid\n---\n\nShall I adjust?`;
          } else if (match.from.includes('Ganesh')) {
            response = `Draft reply to ${match.from}:\n\n---\nHi Ganesh,\n\nThanks for reaching out again. Could you share more details on the opportunity? Happy to take a look.\n\nBest,\nDavid\n---\n\nShall I adjust?`;
          } else {
            response = `Found email from ${match.from}: "${match.subject}"\n\nTo draft a personalized reply, open Cowork and say:\n"Draft a reply to ${match.from}"`;
          }
        } else {
          response = `No recent email from "${person}" found. Recent senders:\n` + INBOX_EMAILS.slice(0,8).map(e => `  \u2022 ${e.from}`).join('\n');
        }
      } else {
        response = `Who should I draft a reply to? Recent action items:\n` + INBOX_EMAILS.filter(e => e.category === 'action').map(e => `  \u2022 ${e.from} - ${e.subject}`).join('\n');
      }

    } else if (lower.includes('find') || lower.includes('search') || lower.includes('about') || lower.includes('from')) {
      const query = cmd.replace(/^(find|search|look for|emails?)\s*(about|from|regarding|for|with)?\s*/i, '').trim().toLowerCase();
      if (query) {
        const results = INBOX_EMAILS.filter(e =>
          e.from.toLowerCase().includes(query) ||
          e.subject.toLowerCase().includes(query) ||
          e.snippet.toLowerCase().includes(query) ||
          (e.company||'').toLowerCase().includes(query) ||
          (e.type||'').toLowerCase().includes(query)
        );
        if (results.length > 0) {
          response = `Found ${results.length} email${results.length>1?'s':''} matching "${query}":\n\n`;
          results.forEach(e => { response += `\u{1F4E7} ${e.from} (${e.date})\n   ${e.subject}\n   ${e.snippet.substring(0,80)}...\n\n`; });
        } else {
          response = `No emails matching "${query}" in recent unread. Try searching in Gmail directly for older emails.`;
        }
      } else {
        response = `What are you looking for? Try:\n  \u2022 "find emails about trovy"\n  \u2022 "find from dennis"\n  \u2022 "find deal emails"`;
      }

    } else if (lower.includes('follow') || lower.includes('pending') || lower.includes('waiting')) {
      response = `Emails awaiting your response:\n\n`;
      INBOX_EMAILS.filter(e => e.category === 'action').forEach(e => {
        response += `\u{26A0}\u{FE0F} ${e.from}: ${e.subject}\n   "${e.snippet.substring(0,70)}..."\n\n`;
      });
      response += `Suggestion: Reply to Vincent Chen first (time-sensitive - tonight 8:30 PM).`;

    } else if (lower.includes('contact') || lower.includes('crm') || lower.includes('who is')) {
      const name = cmd.replace(/^(who is|lookup|find contact|crm)\s*/i, '').trim();
      const contacts = loadContacts();
      const emailMatch = INBOX_EMAILS.find(e => e.from.toLowerCase().includes(name.toLowerCase()));
      const crmMatch = contacts.find(c => c.name.toLowerCase().includes(name.toLowerCase()));
      if (crmMatch) {
        response = `CRM: ${crmMatch.name}${crmMatch.company?' @ '+crmMatch.company:''}${crmMatch.role?'\nRole: '+crmMatch.role:''}${crmMatch.email?'\nEmail: '+crmMatch.email:''}${crmMatch.notes?'\nNotes: '+crmMatch.notes:''}`;
      }
      if (emailMatch) {
        response += `${response?'\n\n':''}Latest email: ${emailMatch.from} <${emailMatch.email}>${emailMatch.company?'\nCompany: '+emailMatch.company:''}\nSubject: ${emailMatch.subject}\nDate: ${emailMatch.date}`;
      }
      if (!crmMatch && !emailMatch) {
        response = `No match for "${name}". Try adding them via Add Contact on the Home tab.`;
      }

    } else if (lower.includes('deal') || lower.includes('pipeline')) {
      const deals = INBOX_EMAILS.filter(e => e.type === 'deal');
      response = `Deal-related emails (${deals.length}):\n\n`;
      deals.forEach(e => { response += `\u{1F4BC} ${e.from}${e.company?' ('+e.company+')':''} \n   ${e.subject}\n   ${e.date}\n\n`; });

    } else {
      const results = INBOX_EMAILS.filter(e =>
        e.from.toLowerCase().includes(lower) ||
        e.subject.toLowerCase().includes(lower) ||
        e.snippet.toLowerCase().includes(lower) ||
        (e.company||'').toLowerCase().includes(lower)
      );
      if (results.length > 0) {
        response = `Found ${results.length} match${results.length>1?'es':''}:\n\n`;
        results.forEach(e => { response += `\u{1F4E7} ${e.from} (${e.date})\n   ${e.subject}\n\n`; });
      } else {
        response = `I can help with:\n\n  \u2022 "triage" - categorize all unread\n  \u2022 "find [topic/person]" - search emails\n  \u2022 "draft reply to [person]" - compose response\n  \u2022 "summarize newsletters" - digest research\n  \u2022 "deal emails" - pipeline-related\n  \u2022 "follow-ups" - pending responses\n  \u2022 "who is [name]" - CRM + email lookup`;
      }
    }

    state.inboxMessages.push({ role: 'assistant', text: response });
    state.inboxProcessing = false;
    render();
    setTimeout(() => { const el = document.querySelector('.section'); if (el) el.scrollTop = el.scrollHeight; }, 50);
  }, 400);
}

function esc(s) { if (!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Initial render
initCategoryIcons();
render();
</script>
</body>
</html>
